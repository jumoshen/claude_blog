name: Build and Push Docker Images

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend-api
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/claude-blog/frontend-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/claude-blog/frontend-api:latest

      - name: Build and push blog-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./blog-frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/claude-blog/blog-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/claude-blog/blog-frontend:latest
