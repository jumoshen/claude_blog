<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/logo-pixel.ico" id="favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jumoshen</title>
    <meta name="keywords" content="jumoshen, 巨魔深, 巨魔, jumo, 技术博客, 技术文章, 编程, blog" />
    <meta name="description" content="巨魔深的技术博客，分享技术文章、编程经验与开发心得。jumoshen's tech blog." />
    <meta name="author" content="jumoshen" />
    <!-- 像素风字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <!-- 可爱风字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Q版字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- 动态切换Favicon -->
    <script>
      (function() {
        const theme = localStorage.getItem('blog-theme') || 'pixel';
        const favicon = document.getElementById('favicon');
        favicon.href = '/logo-' + theme + '.ico';
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
