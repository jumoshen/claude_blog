# Claude Blog 生产环境部署
version: '3'

services:
  # C端前端
  blog-frontend:
    image: jumoshen/claude_blog_frontend:latest
    container_name: cc-blog-web
    restart: always
    ports:
      - "3000:80"
    networks:
      - blog-network

  # C端 API
  blog-api:
    image: jumoshen/claude_blog_api:latest
    container_name: cc-blog-api
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /home/blog-deploy/content:/app/content
    networks:
      - blog-network

  # B端前端
  blog-admin-frontend:
    image: jumoshen/claude_blog_admin_frontend:latest
    container_name: cc-blog-admin-web
    restart: always
    ports:
      - "3001:80"
    networks:
      - blog-network

  # B端后端
  blog-admin-backend:
    image: jumoshen/claude_blog_admin_backend:latest
    container_name: cc-blog-admin-backend
    restart: always
    ports:
      - "8082:8080"
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge
