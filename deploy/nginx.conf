upstream blog-web {
    server blog-frontend:80;
}

upstream blog-admin {
    server admin-frontend:80;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name jumoshen.cn www.jumoshen.cn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 80;
    server_name back.jumoshen.cn;
    return 301 https://$server_name$request_uri;
}

# HTTPS C端前端
server {
    listen 443 ssl http2;
    server_name jumoshen.cn www.jumoshen.cn;

    ssl_certificate /etc/letsencrypt/live/www.jumoshen.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.jumoshen.cn/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://blog-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://cc-blog-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS B端后台
server {
    listen 443 ssl http2;
    server_name back.jumoshen.cn;

    ssl_certificate /etc/letsencrypt/live/back.jumoshen.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/back.jumoshen.cn/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://blog-admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://admin-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth {
        proxy_pass http://admin-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
