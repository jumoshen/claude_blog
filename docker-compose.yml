version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: cc-blog-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=Blog2024Secure
      - MYSQL_DATABASE=blog
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cc-blog-net

  redis:
    image: redis:7-alpine
    container_name: cc-blog-redis
    ports:
      - "6380:6379"
    networks:
      - cc-blog-net

  frontend-api:
    image: ghcr.io/jumoshen/claude-blog/frontend-api:latest
    container_name: cc-blog-api
    ports:
      - "8080:8080"
    volumes:
      - ./frontend-api/config.yaml:/app/config.yaml:ro
    environment:
      - GIN_MODE=release
    depends_on:
      - mysql
      - redis
    networks:
      - cc-blog-net

  blog-frontend:
    image: ghcr.io/jumoshen/claude-blog/blog-frontend:latest
    container_name: cc-blog-web
    ports:
      - "3000:80"
    depends_on:
      - frontend-api
    networks:
      - cc-blog-net

  file-service:
    image: minio/minio:latest
    container_name: cc-blog-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=blogadmin
      - MINIO_ROOT_PASSWORD=BlogMinIO2024
    volumes:
      - file_data:/data
    networks:
      - cc-blog-net
    command: server /data --console-address ":9001"

  admin-backend:
    image: ghcr.io/jumoshen/claude-blog-admin/admin-backend:latest
    container_name: cc-blog-admin-backend
    ports:
      - "8082:8080"
    volumes:
      - ./deploy/config-admin.yaml:/app/config.yaml:ro
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - mysql
      - file-service
    networks:
      - cc-blog-net

  admin-frontend:
    image: ghcr.io/jumoshen/claude-blog-admin/admin-frontend:latest
    container_name: cc-blog-admin-frontend
    ports:
      - "3001:80"
    depends_on:
      - admin-backend
    networks:
      - cc-blog-net

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - cc-blog-net
    depends_on:
      - blog-frontend
      - frontend-api
      - admin-backend
      - admin-frontend

networks:
  cc-blog-net:
    driver: bridge

volumes:
  mysql_data:
  file_data:
