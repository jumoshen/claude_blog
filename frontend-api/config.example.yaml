server:
  host: "0.0.0.0"
  port: 8080

site:
  title: "Jumoshen"
  author: "Hui Liang"
  description: "巨魔深，一个属于自己的博客，在这里你可以分享自己的知识，一加一永远大于二"
  beian: "京ICP备16019475号-1"
  keywords: "巨魔深,巨魔客,巨魔,jumoshen,blog_jumo"

database:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "your-db-password"
  database: "blog"

redis:
  host: "127.0.0.1"
  port: 6379
  password: ""
  db: 0

log:
  level: "debug"
  path: "./logs"
  filename: "blog"
  max_size: 100
  max_backups: 30
  max_age: 7
  compress: true
  console: true

github:
  client_id: "your-github-client-id"
  client_secret: "your-github-client-secret"
  callback_url: "http://localhost:8080/api/v1/auth/callback"

content:
  path: "/path/to/your/content"
  base_url: "http://localhost:8080"

jwt:
  secret: "your-jwt-secret-key-change-in-production"
  expiration: 604800 # 7 days in seconds
  issuer: "frontend-api"
