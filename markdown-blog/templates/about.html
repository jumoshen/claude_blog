{{define "about"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 - 我的博客</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #0ea5e9 0%, #0891b2 100%);
        }
        .gradient-animated {
            background: linear-gradient(-45deg, #0ea5e9, #0891b2, #06b6d4, #14b8a6);
            background-size: 300% 300%;
            animation: gradient-shift 8s ease infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .pulse-ring {
            animation: pulse-ring 2.5s ease-out infinite;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.6s ease-out forwards;
        }
        .gradient-text {
            background: linear-gradient(135deg, #0ea5e9 0%, #0891b2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="gradient-animated text-white relative overflow-hidden">
        <div class="absolute inset-0">
            <div class="absolute top-20 left-10 w-32 h-32 rounded-full bg-white/10 blur-xl float-animation"></div>
            <div class="absolute top-40 right-20 w-40 h-40 rounded-full bg-white/5 blur-2xl float-animation" style="animation-delay: -2s;"></div>
        </div>
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-slate-900/20"></div>
        <nav class="relative max-w-4xl mx-auto px-4 py-6 flex items-center justify-between">
            <a href="/" class="text-2xl font-bold tracking-tight hover:opacity-90 transition-opacity flex items-center gap-2">
                <span class="text-3xl">&#9997;</span>
                我的博客
            </a>
            <div class="flex items-center gap-8">
                <a href="/" class="text-white/90 hover:text-white transition-colors font-medium">文章</a>
                <a href="/archives" class="text-white/90 hover:text-white transition-colors font-medium">归档</a>
                <a href="/about" class="text-white font-medium border-b-2 border-white pb-1">关于</a>
                {{if .User}}
                <div class="relative">
                    <button id="avatar-btn" class="flex items-center gap-2 hover:opacity-90 transition-opacity">
                        <img src="{{.User.AvatarURL}}" alt="{{.User.Login}}" class="w-10 h-10 rounded-full border-2 border-white/50">
                        <svg class="w-4 h-4 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div id="avatar-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl py-3 z-50 border border-white/20">
                        <div class="px-4 py-3 border-b border-gray-100">
                            <p class="text-gray-800 font-semibold">{{.User.Name}}</p>
                            <p class="text-gray-500 text-sm">{{.User.Email}}</p>
                        </div>
                        <a href="/logout" class="block px-4 py-2.5 text-gray-700 hover:bg-cyan-50 hover:text-cyan-600 transition-all rounded-lg mx-2 mt-2">
                            退出登录
                        </a>
                    </div>
                </div>
                {{else}}
                <a href="/login" class="px-6 py-2.5 bg-white text-cyan-600 rounded-full font-bold hover:bg-gray-100 transition-all shadow-lg">
                    GitHub 登录
                </a>
                {{end}}
            </div>
        </nav>
    </header>

    <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-16">
        <div class="text-center mb-12 animate-slide-up">
            <div class="relative inline-block mb-8">
                <div class="w-36 h-36 rounded-full bg-gradient-to-br from-purple-500 via-pink-500 to-indigo-600 flex items-center justify-center text-white text-6xl font-bold shadow-2xl">
                    ?
                </div>
                <div class="absolute inset-0 rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 pulse-ring"></div>
            </div>
            <h1 class="text-4xl font-bold text-gray-900 mb-3">关于我</h1>
            <p class="text-xl text-gray-500">很高兴认识你</p>
        </div>

        <div class="glass-card rounded-3xl shadow-xl p-8 md:p-12 prose prose-lg max-w-none mb-10 animate-slide-up stagger-1
            prose-headings:text-gray-900 prose-headings:font-bold prose-headings:border-b prose-headings:border-gray-200 prose-headings:pb-3 prose-headings:mb-4
            prose-p:text-gray-700 prose-p:leading-relaxed prose-p:mb-5
            prose-a:text-purple-600 prose-a:no-underline hover:prose-a:underline
            prose-blockquote:border-l-4 prose-blockquote:border-purple-500 prose-blockquote:pl-5 prose-blockquote:italic prose-blockquote:text-gray-600 prose-blockquote:bg-purple-50 prose-blockquote:py-2 prose-blockquote:rounded-r-lg
            prose-ul:text-gray-700 prose-li:mb-2 prose-li:flex prose-li:items-center
            prose-ol:text-gray-700 prose-li:mb-2
            prose-img:rounded-2xl prose-img:shadow-xl prose-img:mx-auto
            prose-hr:border-gray-200 prose-hr:my-10
            prose-strong:text-cyan-600
        ">
            {{.Content}}
        </div>

        <div class="text-center animate-slide-up stagger-2">
            <a href="/" class="inline-flex items-center gap-3 px-8 py-4 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-full font-semibold hover:shadow-xl hover:scale-105 transition-all shadow-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                返回首页
            </a>
        </div>
    </main>

    <footer class="bg-gradient-to-r from-gray-900 via-slate-800 to-gray-900 text-gray-300 py-12 mt-auto">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <p class="text-lg mb-2">&copy; 2024 我的博客. All rights reserved.</p>
            <p class="text-gray-500 text-sm">Made with &#10084; and Go</p>
        </div>
    </footer>
    <script>
        const avatarBtn = document.getElementById('avatar-btn');
        const avatarDropdown = document.getElementById('avatar-dropdown');
        if (avatarBtn && avatarDropdown) {
            avatarBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                avatarDropdown.classList.toggle('hidden');
            });
            document.addEventListener('click', function() {
                avatarDropdown.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
{{end}}
